<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Balance</title>

    <link rel="stylesheet" href="css/calc.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<main class="page">

<section class="card">

    <a class="back-link" href="../NAV/Nav.html">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Navigation
    </a>

    <p class="eyebrow">
        Shared Expenses
    </p>

    <h1>Balance</h1>

    <p class="intro">
        Keep track of shared expenses, holidays, concerts and weekends away.
        Add payments, then calculate who owes who.
    </p>

    <div class="layout">

        <section class="workspace">

        <div class="panel">

            <h2>People</h2>

            <div id="peopleList">

                <input
                    class="person-input"
                    type="text"
                    placeholder="Person 1"
                    maxlength="30">

                <input
                    class="person-input"
                    type="text"
                    placeholder="Person 2"
                    maxlength="30">

            </div>

            <button id="addPersonButton" class="secondary-button">

                <i class="fa-solid fa-user-plus"></i>

                Add Person

            </button>

        </div>

        <div class="panel">

            <h2>Transactions</h2>

            <div id="transactionList"></div>

            <button id="addTransactionButton"
                    class="secondary-button">

                <i class="fa-solid fa-plus"></i>

                Add Transaction

            </button>

        </div>

            <div class="panel">

                <button class="calculate" disabled>

                    <i class="fa-solid fa-scale-balanced"></i>

                    Calculate Settlement

                </button>

            </div>

        </section>

        <aside class="calculator-panel">

            <div class="panel">

                <h2>Calculator</h2>

                <iframe
                    width="219"
                    height="302"
                    src="https://calculator-1.com/outdoor/?f=2d655f&r=243331"
                    scrolling="no"
                    frameborder="0">
                </iframe>

            </div>

        </aside>

    </div>

</section>

</main>

<footer class="footer">
    © Rebecca Mulholland
</footer>

<script src="js/calc.js"></script>

</body>
</html>
