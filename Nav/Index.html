<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rebecca Mulholland | Nav</title>
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <main class="page">
        <section class="card nav-card">
            <p class="eyebrow">Navigation 🛬</p>
            <h1>Quick Links</h1>

            <p class="intro">
                A small launchpad for personal projects, tools, and pages I use often.
            </p>

            <div class="nav-grid">
                <a class="nav-tile" href="https://rebeccamul.github.io/">
                    <i class="fa-regular fa-id-card"></i>
                    <div>
                        <strong>Business Card</strong>
                        <small>Public landing page</small>
                    </div>
                </a>

                <a class="nav-tile" href="https://rebeccamul.github.io/Wardrobe/form.html">
                    <i class="fa-solid fa-tags"></i>
                    <div>
                        <strong>Wardrobe Entry</strong>
                        <small>Add clothing items</small>
                    </div>
                </a>

                <a class="nav-tile" href="https://rebeccamul.github.io/Wardrobe/browse.html">
                    <i class="fa-solid fa-table-cells-large"></i>
                    <div>
                        <strong>Wardrobe Browse</strong>
                        <small>View wardrobe contents</small>
                    </div>
                </a>

               <a class="nav-tile" href="https://rebeccamul.github.io/Split/calc.html" aria-disabled="true">
                    <i class="fa-solid fa-calculator"></i>
                    <div>
                        <strong>SplitCalc</strong>
                        <small>Split the bill</small>
                    </div>
                </a>

                <a class="nav-tile placeholder" href="#" aria-disabled="true">
                    <i class="fa-solid fa-clipboard-question"></i>
                    <div>
                        <strong>Coming Soon</strong>
                        <small>Future personal app</small>
                    </div>
                </a>
            </div>
        </section>
    </main>

    <footer class="footer">
        © Rebecca Mulholland
    </footer>
</body>
</html>
